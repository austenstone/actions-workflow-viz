<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Workflow Run</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <style>
            :root {
                --ok: var(--true-color-green, #1a7f37);
                --ok-bg: var(--true-color-green-muted, rgba(74, 194, 107, 0.16));
                --run: var(--true-color-yellow, #bf8700);
                --run-bg: var(--true-color-yellow-muted, rgba(212, 167, 44, 0.18));
                --fail: var(--true-color-red, #cf222e);
                --fail-bg: var(--true-color-red-muted, rgba(255, 129, 130, 0.16));
                --wait: var(--text-color-muted, #59636e);
                --wait-bg: rgba(125, 133, 144, 0.12);
                --line: var(--border-color-default, #d1d9e0);
                --bg: var(--background-color-default, #ffffff);
                --fg: var(--text-color-default, #1f2328);
                --muted: var(--text-color-muted, #59636e);
            }
            * { box-sizing: border-box; }
            html, body { height: 100%; }
            body {
                margin: 0;
                background: var(--bg);
                color: var(--fg);
                font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
                font-size: var(--text-body-medium, 13px);
                line-height: var(--leading-body-medium, 18px);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* ---- header ---- */
            header {
                padding: 12px 14px 10px;
                border-bottom: 1px solid var(--line);
                flex: 0 0 auto;
            }
            .h-top {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .h-title {
                font-family: var(--font-sans-display, var(--font-sans));
                font-size: var(--text-title-medium, 16px);
                font-weight: var(--font-weight-semibold, 600);
                line-height: 1.25;
                margin: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                flex: 1 1 auto;
            }
            .pill {
                flex: 0 0 auto;
                font-size: 11px;
                font-weight: 600;
                padding: 2px 9px;
                border-radius: 999px;
                border: 1px solid transparent;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                white-space: nowrap;
            }
            .pill.ok { color: var(--ok); background: var(--ok-bg); }
            .pill.fail { color: var(--fail); background: var(--fail-bg); }
            .pill.run { color: var(--run); background: var(--run-bg); }
            .pill.wait { color: var(--wait); background: var(--wait-bg); }
            .pill .dot {
                width: 7px; height: 7px; border-radius: 50%;
                background: currentColor;
            }
            .pill.run .dot { animation: pulse 1.1s ease-in-out infinite; }
            .h-meta {
                margin-top: 6px;
                color: var(--muted);
                font-size: 11.5px;
                display: flex;
                flex-wrap: wrap;
                gap: 4px 10px;
            }
            .h-meta a { color: var(--muted); text-decoration: none; }
            .h-meta a:hover { color: var(--fg); text-decoration: underline; }
            .h-meta code {
                font-family: var(--font-mono, monospace);
                font-size: 11px;
            }
            .h-meta a.actor {
                display: inline-flex;
                align-items: center;
                gap: 5px;
            }
            .h-meta .avatar {
                width: 16px;
                height: 16px;
                border-radius: 50%;
                box-shadow: 0 0 0 1px var(--line);
                background: var(--wait-bg);
                vertical-align: text-bottom;
                flex: 0 0 auto;
            }

            /* ---- progress band ---- */
            .prog { padding: 10px 14px 11px; border-bottom: 1px solid var(--line); flex: 0 0 auto; }
            .prog-bar {
                height: 8px;
                border-radius: 999px;
                background: var(--wait-bg);
                overflow: hidden;
                display: flex;
            }
            .prog-bar i { height: 100%; display: block; flex: 0 0 auto; transition: width 0.5s ease; }
            .prog-bar i.ok { background: var(--ok); }
            .prog-bar i.fail { background: var(--fail); }
            .prog-bar i.run {
                background: repeating-linear-gradient(
                    -45deg, var(--run), var(--run) 6px,
                    color-mix(in srgb, var(--run) 60%, transparent) 6px,
                    color-mix(in srgb, var(--run) 60%, transparent) 12px);
                background-size: 200% 100%;
                animation: flow 1s linear infinite;
            }
            .prog-bar i.skip { background: var(--wait); opacity: 0.55; }
            .prog-meta {
                margin-top: 8px;
                display: flex;
                align-items: baseline;
                gap: 8px;
                flex-wrap: wrap;
                font-size: 12px;
                color: var(--muted);
            }
            .prog-meta .big {
                color: var(--fg);
                font-weight: 600;
                font-size: 13px;
            }
            .prog-meta .sep { opacity: 0.4; }
            .prog-meta .cnt { display: inline-flex; align-items: center; gap: 4px; }
            .prog-meta .swatch { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }

            /* ---- graph scroll area ---- */
            .scroll {
                flex: 1 1 auto;
                overflow: auto;
                position: relative;
                padding: 16px 12px 22px;
            }
            .content { position: relative; min-height: 100%; }
            svg.edges {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                overflow: visible;
                z-index: 0;
            }
            .edge { fill: none; stroke: var(--line); stroke-width: 1.5; }
            .edge.active {
                stroke: var(--run);
                stroke-width: 2;
                stroke-dasharray: 4 5;
                animation: march 0.7s linear infinite;
            }
            .stages { position: relative; z-index: 1; display: flex; flex-direction: column; }
            .stage {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 14px 16px;
                padding: 13px 0;
            }

            /* ---- job cards ---- */
            .card {
                width: 196px;
                max-width: 46vw;
                min-width: 150px;
                background: var(--bg);
                border: 1px solid var(--line);
                border-left-width: 4px;
                border-radius: 9px;
                padding: 9px 11px;
                text-decoration: none;
                color: inherit;
                display: block;
                cursor: pointer;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
                transition: box-shadow 0.15s ease, transform 0.1s ease,
                    border-left-color 0.4s ease, background-color 0.4s ease, filter 0.4s ease;
            }
            .card:hover { box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1); transform: translateY(-1px); }
            .card.s-ok { border-left-color: var(--ok); }
            .card.s-fail { border-left-color: var(--fail); }
            .card.s-run { border-left-color: var(--run); background: linear-gradient(0deg, var(--run-bg), transparent 70%); }
            .card.s-wait { border-left-color: var(--wait); filter: opacity(0.82); }
            .card.s-skip { border-left-color: var(--wait); filter: opacity(0.6); }
            .card.s-run { animation: ring 1.8s ease-in-out infinite; }

            .c-top { display: flex; align-items: center; gap: 7px; }
            .ico {
                flex: 0 0 auto;
                width: 16px; height: 16px;
                display: inline-flex; align-items: center; justify-content: center;
                font-size: 12px; font-weight: 700;
                border-radius: 50%;
            }
            .ico.ok { color: #fff; background: var(--ok); }
            .ico.fail { color: #fff; background: var(--fail); }
            .ico.skip { color: var(--muted); }
            .ico.wait { color: var(--muted); border: 1.5px solid var(--line); }
            .ico.run {
                border: 2px solid var(--run-bg);
                border-top-color: var(--run);
                animation: spin 0.8s linear infinite;
            }
            .c-name {
                font-weight: 600;
                font-size: 12.5px;
                line-height: 1.2;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                flex: 1 1 auto;
            }
            .c-sub {
                margin-top: 5px;
                display: flex;
                align-items: center;
                gap: 6px;
                color: var(--muted);
                font-size: 11px;
            }
            .c-sub .dur { font-variant-numeric: tabular-nums; }
            .c-sub .tag {
                font-size: 10px;
                padding: 0px 5px;
                border-radius: 4px;
                background: var(--wait-bg);
                color: var(--muted);
            }
            .c-sub .ctx {
                font-size: 10px;
                padding: 1px 6px;
                border-radius: 4px;
                background: var(--wait-bg);
                color: var(--muted);
            }
            .c-name-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1 1 auto; }
            .c-name-wrap .c-name { flex: 0 1 auto; }
            .mtx {
                flex: 0 0 auto;
                font-size: 9.5px;
                font-weight: 700;
                letter-spacing: 0.03em;
                text-transform: uppercase;
                padding: 1px 5px;
                border-radius: 999px;
                background: var(--run-bg);
                color: var(--run);
                border: 1px solid var(--run);
                cursor: default;
            }
            .c-step { margin-top: 7px; }
            .sbar {
                height: 4px; border-radius: 999px; background: var(--wait-bg);
                overflow: hidden;
            }
            .sbar i { display: block; height: 100%; background: var(--run); }
            .c-step .lbl {
                margin-top: 4px;
                font-size: 10.5px;
                color: var(--muted);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ---- footer ---- */
            footer {
                flex: 0 0 auto;
                border-top: 1px solid var(--line);
                padding: 7px 14px;
                color: var(--muted);
                font-size: 11px;
                display: flex;
                justify-content: space-between;
                gap: 10px;
            }

            /* ---- overlay states ---- */
            .overlay {
                position: absolute; inset: 0;
                display: none;
                align-items: center; justify-content: center;
                flex-direction: column; gap: 10px;
                text-align: center; padding: 24px;
                color: var(--muted);
                background: var(--bg);
                z-index: 5;
            }
            .overlay.show { display: flex; }
            .overlay .big { font-size: 14px; color: var(--fg); font-weight: 600; }
            .spin {
                width: 22px; height: 22px; border-radius: 50%;
                border: 3px solid var(--wait-bg); border-top-color: var(--run);
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin { to { transform: rotate(360deg); } }
            @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
            @keyframes march { to { stroke-dashoffset: -18; } }
            @keyframes flow { to { background-position: -200% 0; } }
            @keyframes ring {
                0%, 100% { box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 0 var(--run-bg); }
                50% { box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 0 0 4px var(--run-bg); }
            }
        </style>
    </head>
    <body>
        <header>
            <div class="h-top">
                <h1 class="h-title" id="title">Workflow Run</h1>
                <span class="pill wait" id="pill"><span class="dot"></span><span id="pill-txt">…</span></span>
            </div>
            <div class="h-meta" id="meta"></div>
        </header>

        <div class="prog" id="prog">
            <div class="prog-bar" id="prog-bar"></div>
            <div class="prog-meta" id="prog-meta"></div>
        </div>

        <div class="scroll" id="scroll">
            <div class="content" id="content">
                <svg class="edges" id="edges"></svg>
                <div class="stages" id="stages"></div>
            </div>
            <div class="overlay" id="overlay">
                <div class="spin" id="ov-spin"></div>
                <div class="big" id="ov-title">Loading…</div>
                <div id="ov-msg"></div>
            </div>
        </div>

        <footer>
            <span id="foot-left"></span>
            <span id="foot-right"></span>
        </footer>

        <script type="module">
            import { enterCard, flipStatus, shakeStatus, tweenWidth, enterEdge, popPill } from "/anim.js";
            const SVGNS = "http://www.w3.org/2000/svg";
            let lastRun = null;
            let stageRows = [];          // persistent .stage row elements
            let progSegs = null;         // persistent progress-bar segments
            let newCardSeq = 0;          // stagger index for cards entering this render
            const edgeEls = new Map();   // "from->to" -> <path>

            // ---------- formatting ----------
            function fmtDur(ms) {
                if (ms == null || ms < 0) return "";
                const s = Math.floor(ms / 1000);
                if (s < 60) return s + "s";
                const m = Math.floor(s / 60);
                const r = s % 60;
                if (m < 60) return r ? `${m}m ${r}s` : `${m}m`;
                const h = Math.floor(m / 60);
                return `${h}h ${m % 60}m`;
            }
            function durOf(node, now) {
                if (!node.started_at) return "";
                const start = new Date(node.started_at).getTime();
                const end = node.completed_at ? new Date(node.completed_at).getTime() : now;
                return fmtDur(end - start);
            }
            function elapsedOf(run, now) {
                if (!run.run_started_at) return "";
                const start = new Date(run.run_started_at).getTime();
                const end = run.status === "completed" && run.updated_at
                    ? new Date(run.updated_at).getTime()
                    : now;
                return fmtDur(end - start);
            }

            // ---------- status mapping ----------
            // -> { cls, ico, label } where cls in ok|fail|run|wait|skip
            function statusOf(node) {
                if (node.status === "in_progress") return { cls: "run", ico: "", label: "Running" };
                if (node.status === "queued") return { cls: "wait", ico: "○", label: "Queued" };
                if (node.status === "pending") return { cls: "wait", ico: "○", label: "Pending" };
                const c = node.conclusion;
                if (c === "success") return { cls: "ok", ico: "✓", label: "Passed" };
                if (c === "skipped") return { cls: "skip", ico: "↷", label: "Skipped" };
                if (c === "cancelled") return { cls: "skip", ico: "⊘", label: "Cancelled" };
                if (c === "neutral" || c === "action_required") return { cls: "wait", ico: "!", label: c };
                return { cls: "fail", ico: "✕", label: c === "timed_out" ? "Timed out" : "Failed" };
            }
            function legProgress(node) {
                // matrix rollup: completed legs / total
                const total = node.legs.length;
                const done = node.legs.filter((l) => l.status === "completed").length;
                return { done, total };
            }
            function stepProgress(node) {
                // single-leg step rollup for an in-progress job
                if (node.legs.length !== 1) return null;
                const steps = node.legs[0].steps || [];
                if (!steps.length) return null;
                const total = steps.length;
                const done = steps.filter((s) => s.status === "completed").length;
                const cur = steps.find((s) => s.status === "in_progress");
                return { done, total, cur: cur ? cur.name : null };
            }

            // ---------- layering (top-down longest path) ----------
            function computeLayers(run) {
                const nodes = run.nodes;
                const byId = new Map(nodes.map((n) => [n.id, n]));
                const preds = new Map(nodes.map((n) => [n.id, []]));
                const succ = new Map(nodes.map((n) => [n.id, []]));
                for (const e of run.edges) {
                    if (byId.has(e.from) && byId.has(e.to)) {
                        preds.get(e.to).push(e.from);
                        succ.get(e.from).push(e.to);
                    }
                }
                const layer = new Map();
                function depth(id, seen) {
                    if (layer.has(id)) return layer.get(id);
                    if (seen.has(id)) return 0;
                    seen.add(id);
                    const ps = preds.get(id) || [];
                    let d = 0;
                    for (const p of ps) d = Math.max(d, depth(p, seen) + 1);
                    layer.set(id, d);
                    return d;
                }
                for (const n of nodes) depth(n.id, new Set());
                const maxLayer = Math.max(0, ...nodes.map((n) => layer.get(n.id) || 0));
                const stages = Array.from({ length: maxLayer + 1 }, () => []);
                for (const n of nodes) stages[layer.get(n.id) || 0].push(n);
                return { stages, layer };
            }

            // ---------- card registry (built once, updated in place) ----------
            const cardEls = new Map();   // id -> <a.card>
            const prevCls = new Map();   // id -> last status cls (to detect flips)

            function ensureCard(node) {
                let el = cardEls.get(node.id);
                if (el) return el;
                el = document.createElement("a");
                el.className = "card";
                el.style.opacity = "0";   // revealed by enterCard on the next frame
                el.dataset.id = node.id;
                el.setAttribute("role", "button");
                el.tabIndex = 0;
                // The card no longer navigates anywhere. Clicking (or Enter/Space on)
                // it pushes the job's logs + metadata into the agent's context.
                const onActivate = (e) => {
                    e.preventDefault();
                    addJobToContext(el, node.id);
                };
                el.addEventListener("click", onActivate);
                el.addEventListener("keydown", (e) => {
                    if (e.key !== "Enter" && e.key !== " ") return;
                    onActivate(e);
                });
                const top = document.createElement("div");
                top.className = "c-top";
                const ico = document.createElement("span");
                ico.className = "ico";
                const nameWrap = document.createElement("span");
                nameWrap.className = "c-name-wrap";
                const name = document.createElement("span");
                name.className = "c-name";
                name.textContent = node.label;
                name.title = node.label;
                const mtx = document.createElement("span");
                mtx.className = "mtx";
                mtx.textContent = "matrix";
                mtx.style.display = "none";
                nameWrap.append(name, mtx);
                top.append(ico, nameWrap);
                const sub = document.createElement("div");
                sub.className = "c-sub";
                const dur = document.createElement("span");
                dur.className = "dur";
                sub.append(dur);
                el.append(top, sub);
                el._ico = ico; el._name = name; el._dur = dur; el._sub = sub; el._mtx = mtx;
                el._tag = null; el._step = null; el._ctx = null;
                cardEls.set(node.id, el);
                // Stagger the reveal; the card is appended synchronously this tick,
                // so the rAF runs after it's in the DOM. Motion handles the tween.
                const idx = newCardSeq++;
                requestAnimationFrame(() => enterCard(el, idx));
                return el;
            }

            // Update one card's bound fields in place — only touch the DOM when a
            // value actually changed, so polls don't restart animations or flicker.
            function updateCard(node, now) {
                const el = ensureCard(node);
                const st = statusOf(node);
                const cls = "s-" + st.cls;
                if (!el.classList.contains(cls)) {
                    el.classList.remove("s-ok", "s-fail", "s-run", "s-wait", "s-skip");
                    el.classList.add(cls);
                    const was = prevCls.get(node.id);
                    if (was && was !== st.cls) (st.cls === "fail" ? shakeStatus : flipStatus)(el._ico);
                    prevCls.set(node.id, st.cls);
                }
                const icoCls = "ico " + st.cls;
                if (el._ico.className !== icoCls) el._ico.className = icoCls;
                if (el._ico.textContent !== st.ico) el._ico.textContent = st.ico;
                if (el._name.textContent !== node.label) { el._name.textContent = node.label; el._name.title = node.label; }
                if (node.matrix) {
                    if (el._mtx.style.display !== "") el._mtx.style.display = "";
                    const n = node.legs.length;
                    const mTxt = n ? `matrix · ${n}` : "matrix";
                    if (el._mtx.textContent !== mTxt) el._mtx.textContent = mTxt;
                    // Hover reveals the individual legs (resolved matrix values)
                    // so the rollup never hides which combinations ran.
                    const tip = node.legs.length
                        ? node.legs.map((l) => `${l.name} — ${l.conclusion || l.status}`).join("\n")
                        : "waiting for matrix legs…";
                    if (el._mtx.title !== tip) el._mtx.title = tip;
                } else if (el._mtx.style.display !== "none") {
                    el._mtx.style.display = "none";
                }
                const durTxt = durOf(node, now) || st.label;
                if (el._dur.textContent !== durTxt) el._dur.textContent = durTxt;

                let tagTxt = null;
                if (node.matrix && node.legs.length) { const lp = legProgress(node); tagTxt = `${lp.done}/${lp.total} legs`; }
                else if (node.status === "completed") tagTxt = st.label;
                if (tagTxt) {
                    if (!el._tag) { el._tag = document.createElement("span"); el._tag.className = "tag"; el._sub.append(el._tag); }
                    if (el._tag.textContent !== tagTxt) el._tag.textContent = tagTxt;
                } else if (el._tag) { el._tag.remove(); el._tag = null; }

                if (node.status === "in_progress") {
                    const sp = stepProgress(node);
                    const lp = legProgress(node);
                    const pct = sp ? (sp.total ? sp.done / sp.total : 0) : (lp.total ? lp.done / lp.total : 0);
                    if (!el._step) {
                        const wrap = document.createElement("div"); wrap.className = "c-step";
                        const bar = document.createElement("div"); bar.className = "sbar";
                        const fill = document.createElement("i"); bar.append(fill);
                        const lbl = document.createElement("div"); lbl.className = "lbl";
                        wrap.append(bar, lbl); el.append(wrap);
                        el._step = { wrap, fill, lbl };
                    }
                    const wpct = Math.round(pct * 100);
                    if (el._step.pct !== wpct) { el._step.pct = wpct; tweenWidth(el._step.fill, wpct); }
                    const lbl = sp && sp.cur ? `▸ ${sp.cur}` : (node.matrix && lp.total ? `${lp.done}/${lp.total} legs done` : "running…");
                    if (el._step.lbl.textContent !== lbl) el._step.lbl.textContent = lbl;
                } else if (el._step) { el._step.wrap.remove(); el._step = null; }
                return el;
            }

            function setText(id, txt) {
                const el = document.getElementById(id);
                if (el && el.textContent !== txt) el.textContent = txt;
            }
            // Reconcile a parent's children to exactly `desired` (in order), moving
            // existing nodes instead of recreating them.
            function syncChildren(parent, desired) {
                for (let i = 0; i < desired.length; i++) {
                    if (parent.children[i] !== desired[i]) parent.insertBefore(desired[i], parent.children[i] || null);
                }
                while (parent.children.length > desired.length) parent.lastChild.remove();
            }

            // ---------- render ----------
            function renderRun(run) {
                lastRun = run;
                newCardSeq = 0;   // stagger only the cards created during this render
                syncTicker();
                const now = Date.now();
                document.getElementById("overlay").classList.remove("show");

                // header (idempotent — only write when changed)
                setText("title", run.name || run.display_title || "Workflow Run");
                const pill = document.getElementById("pill");
                let pc = "wait", ptxt = run.status;
                if (run.status === "completed") {
                    pc = run.conclusion === "success" ? "ok"
                        : run.conclusion === "skipped" || run.conclusion === "cancelled" ? "wait" : "fail";
                    ptxt = run.conclusion || "completed";
                } else if (run.status === "in_progress") { pc = "run"; ptxt = "in progress"; }
                else { pc = "wait"; ptxt = run.status; }
                const pillCls = "pill " + pc;
                if (pill.className !== pillCls) { pill.className = pillCls; popPill(pill); }
                setText("pill-txt", ptxt);

                const meta = document.getElementById("meta");
                const ghBase = run.repo ? `https://github.com/${run.repo}` : null;
                const a = (href, inner, cls) =>
                    href ? `<a href="${href}" target="_blank" rel="noopener"${cls ? ` class="${cls}"` : ""}>${inner}</a>` : inner;
                const bits = [];
                if (run.repo) {
                    const runUrl = run.html_url || (run.id ? `${ghBase}/actions/runs/${run.id}` : null);
                    bits.push(`${a(ghBase, run.repo)} ${a(runUrl, `#${run.run_number}`)}`);
                }
                if (run.head_branch)
                    bits.push(`⏎ ${a(`${ghBase}/tree/${encodeURIComponent(run.head_branch)}`, run.head_branch)}`);
                if (run.head_sha)
                    bits.push(a(`${ghBase}/commit/${run.head_sha}`, `<code>${run.head_sha.slice(0, 7)}</code>`));
                if (run.event)
                    bits.push(a(`https://docs.github.com/actions/using-workflows/events-that-trigger-workflows#${run.event}`, run.event));
                if (run.actor)
                    bits.push(a(`https://github.com/${run.actor.login}`,
                        `<img class="avatar" src="https://github.com/${run.actor.login}.png?size=32" alt="" width="16" height="16">${run.actor.login}`,
                        "actor"));
                const metaHtml = bits.map((b) => `<span>${b}</span>`).join("");
                if (meta._html !== metaHtml) { meta.innerHTML = metaHtml; meta._html = metaHtml; }

                // progress band
                paintProgress(run, now);

                // graph — reconcile stages + cards in place (no teardown)
                const stagesEl = document.getElementById("stages");
                let stages;
                if (run.flat || run.edges.length === 0) stages = [run.nodes];
                else stages = computeLayers(run).stages;

                const liveIds = new Set();
                for (let i = 0; i < stages.length; i++) {
                    let row = stageRows[i];
                    if (!row) { row = document.createElement("div"); row.className = "stage"; stagesEl.append(row); stageRows[i] = row; }
                    const desired = [];
                    for (const n of stages[i]) { liveIds.add(n.id); desired.push(updateCard(n, now)); }
                    syncChildren(row, desired);
                }
                while (stageRows.length > stages.length) { stageRows.pop().remove(); }
                for (const [id, el] of cardEls) {
                    if (!liveIds.has(id)) { el.remove(); cardEls.delete(id); prevCls.delete(id); }
                }

                // footer
                setText("foot-left", `${run.nodes.length} jobs · ${run.edges.length} deps` + (run.flat ? " · flat" : ""));
                setText("foot-right", run.fetchedAt ? "updated " + new Date(run.fetchedAt).toLocaleTimeString() : "");

                requestAnimationFrame(() => drawEdges(run));
            }

            function paintProgress(run, now) {
                const total = run.nodes.length || 1;
                let ok = 0, fail = 0, runc = 0, skip = 0, wait = 0;
                for (const n of run.nodes) {
                    const s = statusOf(n).cls;
                    if (s === "ok") ok++;
                    else if (s === "fail") fail++;
                    else if (s === "run") runc++;
                    else if (s === "skip") skip++;
                    else wait++;
                }
                const bar = document.getElementById("prog-bar");
                if (!progSegs) {
                    progSegs = {};
                    for (const k of ["ok", "fail", "run", "skip"]) {
                        const i = document.createElement("i");
                        i.className = k; i.style.width = "0%";
                        bar.append(i); progSegs[k] = i;
                    }
                }
                // CSS transition on .prog-bar i animates these width changes smoothly
                progSegs.ok.style.width = (ok / total) * 100 + "%";
                progSegs.fail.style.width = (fail / total) * 100 + "%";
                progSegs.run.style.width = (runc / total) * 100 + "%";
                progSegs.skip.style.width = (skip / total) * 100 + "%";

                const finished = ok + fail + skip;
                const meta = document.getElementById("prog-meta");
                const elapsed = elapsedOf(run, now);
                const parts = [];
                parts.push(`<span class="big">${finished}/${total} jobs</span>`);
                if (elapsed) parts.push(`<span class="sep">·</span><span>${elapsed}</span>`);
                const cnts = [];
                if (runc) cnts.push(`<span class="cnt"><span class="swatch" style="background:var(--run)"></span>${runc} running</span>`);
                if (fail) cnts.push(`<span class="cnt"><span class="swatch" style="background:var(--fail)"></span>${fail} failed</span>`);
                if (wait) cnts.push(`<span class="cnt"><span class="swatch" style="background:var(--wait)"></span>${wait} queued</span>`);
                if (cnts.length) parts.push(`<span class="sep">·</span>` + cnts.join(`<span class="sep">·</span>`));
                const html = parts.join(" ");
                if (meta._html !== html) { meta.innerHTML = html; meta._html = html; }
            }

            // ---------- edges (measured from laid-out cards, reconciled) ----------
            function drawEdges(run) {
                const svg = document.getElementById("edges");
                const content = document.getElementById("content");
                if (run.flat || run.edges.length === 0) {
                    for (const [, p] of edgeEls) p.remove();
                    edgeEls.clear();
                    return;
                }
                const cRect = content.getBoundingClientRect();
                const cards = new Map();
                content.querySelectorAll(".card").forEach((el) => cards.set(el.dataset.id, el));
                const byId = new Map(run.nodes.map((n) => [n.id, n]));
                const live = new Set();

                for (const e of run.edges) {
                    const from = cards.get(e.from);
                    const to = cards.get(e.to);
                    if (!from || !to) continue;
                    const fr = from.getBoundingClientRect();
                    const tr = to.getBoundingClientRect();
                    const x1 = fr.left - cRect.left + fr.width / 2;
                    const y1 = fr.top - cRect.top + fr.height;
                    const x2 = tr.left - cRect.left + tr.width / 2;
                    const y2 = tr.top - cRect.top;
                    const dy = Math.max(18, (y2 - y1) / 2);
                    const d = `M ${x1} ${y1} C ${x1} ${y1 + dy}, ${x2} ${y2 - dy}, ${x2} ${y2}`;
                    const key = e.from + "->" + e.to;
                    live.add(key);
                    let path = edgeEls.get(key);
                    let isNew = false;
                    if (!path) {
                        path = document.createElementNS(SVGNS, "path");
                        path.style.opacity = "0";   // faded in by enterEdge once positioned
                        svg.append(path); edgeEls.set(key, path); isNew = true;
                    }
                    if (path.getAttribute("d") !== d) path.setAttribute("d", d);
                    const pn = byId.get(e.from), cn = byId.get(e.to);
                    const active = pn && (pn.status === "in_progress" ||
                        (pn.status === "completed" && cn && cn.status === "in_progress"));
                    const cls = "edge" + (active ? " active" : "");
                    if (path.getAttribute("class") !== cls) path.setAttribute("class", cls);
                    if (isNew) enterEdge(path);
                }
                for (const [key, p] of edgeEls) { if (!live.has(key)) { p.remove(); edgeEls.delete(key); } }
            }

            // ---------- paint envelope ----------
            function paint(state) {
                if (!state || typeof state !== "object") return;
                const ov = document.getElementById("overlay");
                const ovt = document.getElementById("ov-title");
                const ovm = document.getElementById("ov-msg");
                const ovs = document.getElementById("ov-spin");
                if (state.status === "ok" && state.run) {
                    renderRun(state.run);
                    return;
                }
                ov.classList.add("show");
                if (state.status === "loading") {
                    ovs.style.display = "block";
                    ovt.textContent = "Loading run…";
                    ovm.textContent = state.message || "";
                } else if (state.status === "error") {
                    ovs.style.display = "none";
                    ovt.textContent = "Couldn't load run";
                    ovm.textContent = state.message || "";
                } else {
                    ovs.style.display = "none";
                    ovt.textContent = "No run loaded";
                    ovm.textContent = state.message || "Use the load_run action to point this at a run.";
                }
            }

            // ---------- live connection ----------
            function connect() {
                let es;
                try {
                    es = new EventSource("/events");
                } catch (_) { return; }
                es.onmessage = (ev) => {
                    try { paint(JSON.parse(ev.data)); } catch (_) {}
                };
                es.onerror = () => {
                    es.close();
                    setTimeout(connect, 2000);
                };
            }

            // Click a card to push its logs + metadata into the agent's context.
            // Debounced per-card; surfaces a small pill while the turn is sent.
            function addJobToContext(el, jobId) {
                if (el._ctxBusy) return;
                el._ctxBusy = true;
                if (!el._ctx) {
                    el._ctx = document.createElement("span");
                    el._ctx.className = "ctx";
                    el._sub.append(el._ctx);
                }
                const pill = el._ctx;
                pill.style.display = "";
                pill.textContent = "Adding…";
                callAction("addContext", { jobId })
                    .then(() => {
                        pill.textContent = "📎 Added ✓";
                        setTimeout(() => { pill.style.display = "none"; }, 2000);
                    })
                    .catch(() => { pill.textContent = "context failed"; })
                    .finally(() => { el._ctxBusy = false; });
            }

            function callAction(action, input) {
                return fetch("/action", {
                    method: "POST",
                    headers: { "content-type": "application/json" },
                    body: JSON.stringify({ action, input }),
                }).then(async (r) => {
                    const data = await r.json().catch(() => ({}));
                    if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
                    return data;
                });
            }

            fetch("/state").then((r) => r.json()).then(paint).catch(() => {});
            connect();
            window.addEventListener("resize", () => { if (lastRun) drawEdges(lastRun); });

            // Live tick: update durations + elapsed for in-progress runs without refetch.
            // Self-managing — runs only while a run is active, clears itself on completion,
            // and restarts if a fresh in-progress run is loaded into the same canvas.
            let tickTimer = null;
            function tickOnce() {
                if (!lastRun) { stopTicker(); return; }
                const now = Date.now();
                paintProgress(lastRun, now);
                if (lastRun.status === "completed") { stopTicker(); return; }
                for (const node of lastRun.nodes) {
                    const el = cardEls.get(node.id);
                    if (!el || !el._dur) continue;
                    const txt = durOf(node, now) || statusOf(node).label;
                    if (el._dur.textContent !== txt) el._dur.textContent = txt;
                }
            }
            function stopTicker() {
                if (tickTimer) { clearInterval(tickTimer); tickTimer = null; }
            }
            function syncTicker() {
                if (lastRun && lastRun.status !== "completed") {
                    if (!tickTimer) tickTimer = setInterval(tickOnce, 1000);
                } else {
                    stopTicker();
                }
            }
            window.addEventListener("beforeunload", stopTicker);
        </script>
    </body>
</html>
