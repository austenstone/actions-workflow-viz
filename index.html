<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Actions Workflow Run</title>
        <style>
            :root {
                --ok: var(--true-color-green, #1a7f37);
                --ok-muted: var(--true-color-green-muted, rgba(26, 127, 55, 0.15));
                --bad: var(--true-color-red, #cf222e);
                --bad-muted: var(--true-color-red-muted, rgba(207, 34, 46, 0.15));
                --run: var(--true-color-yellow, #bf8700);
                --run-muted: var(--true-color-yellow-muted, rgba(191, 135, 0, 0.18));
                --idle: var(--text-color-muted, #656d76);
                --idle-muted: rgba(110, 118, 129, 0.12);
                --edge: var(--border-color-default, #d0d7de);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                height: 100%;
            }

            body {
                background: var(--background-color-default, #ffffff);
                color: var(--text-color-default, #1f2328);
                font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
                font-size: var(--text-body-medium, 14px);
                line-height: var(--leading-body-medium, 20px);
                display: flex;
                flex-direction: column;
            }

            header {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border-color-default, #d0d7de);
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .title-row {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }

            h1 {
                margin: 0;
                font-size: var(--text-title-medium, 18px);
                font-weight: var(--font-weight-semibold, 600);
                line-height: 1.2;
            }

            .meta {
                color: var(--text-color-muted, #656d76);
                font-size: var(--text-body-small, 12px);
                display: flex;
                gap: 12px;
                flex-wrap: wrap;
                align-items: center;
            }

            .meta a {
                color: var(--text-color-link, #0969da);
                text-decoration: none;
            }
            .meta a:hover {
                text-decoration: underline;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 2px 10px;
                border-radius: 2em;
                font-size: var(--text-body-small, 12px);
                font-weight: var(--font-weight-semibold, 600);
                border: 1px solid transparent;
            }
            .badge .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: currentColor;
            }
            .badge.ok { color: var(--ok); background: var(--ok-muted); }
            .badge.bad { color: var(--bad); background: var(--bad-muted); }
            .badge.run { color: var(--run); background: var(--run-muted); }
            .badge.idle { color: var(--idle); background: var(--idle-muted); }

            .legend {
                display: flex;
                gap: 14px;
                flex-wrap: wrap;
                font-size: var(--text-body-small, 12px);
                color: var(--text-color-muted, #656d76);
            }
            .legend span {
                display: inline-flex;
                align-items: center;
                gap: 5px;
            }
            .legend i {
                width: 10px;
                height: 10px;
                border-radius: 2px;
                display: inline-block;
            }

            #stage {
                flex: 1;
                overflow: auto;
                position: relative;
            }

            #empty {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-color-muted, #656d76);
                text-align: center;
                padding: 24px;
            }
            #empty.hidden { display: none; }

            .node {
                cursor: pointer;
            }
            .node rect.box {
                rx: 8;
                stroke-width: 1.5;
            }
            .node text {
                font-size: 12px;
                fill: var(--text-color-default, #1f2328);
            }
            .node .sub {
                fill: var(--text-color-muted, #656d76);
                font-size: 10.5px;
            }

            .running rect.box {
                animation: pulse 1.4s ease-in-out infinite;
            }
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.55; }
            }

            .edge {
                fill: none;
                stroke: var(--edge);
                stroke-width: 1.5;
            }
            .edge.active {
                stroke: var(--run);
                stroke-width: 2;
            }

            .spin {
                width: 11px;
                height: 11px;
                border: 2px solid currentColor;
                border-right-color: transparent;
                border-radius: 50%;
                display: inline-block;
                animation: spin 0.7s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }

            footer {
                padding: 6px 16px;
                border-top: 1px solid var(--border-color-default, #d0d7de);
                font-size: var(--text-body-small, 12px);
                color: var(--text-color-muted, #656d76);
                display: flex;
                justify-content: space-between;
                gap: 12px;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="title-row">
                <h1 id="wf-name">Actions Workflow Run</h1>
                <span id="status-badge" class="badge idle"><span class="dot"></span><span id="status-text">idle</span></span>
            </div>
            <div class="meta" id="meta"></div>
            <div class="legend">
                <span><i style="background: var(--ok)"></i> success</span>
                <span><i style="background: var(--bad)"></i> failure</span>
                <span><i style="background: var(--run)"></i> in&nbsp;progress</span>
                <span><i style="background: var(--idle)"></i> queued</span>
                <span><i style="background: var(--idle); opacity: 0.5"></i> skipped</span>
            </div>
        </header>

        <div id="stage">
            <div id="empty">Open a run with <code>load_run</code> to see the live graph.</div>
            <svg id="graph" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>

        <footer>
            <span id="foot-left">Waiting for data…</span>
            <span id="foot-right"></span>
        </footer>

        <script>
            const SVGNS = "http://www.w3.org/2000/svg";
            const COL_W = 230;
            const ROW_H = 78;
            const BOX_W = 188;
            const BOX_H = 54;
            const PAD_X = 28;
            const PAD_Y = 24;

            let lastRun = null;

            function el(name, attrs = {}, text) {
                const node = document.createElementNS(SVGNS, name);
                for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
                if (text != null) node.textContent = text;
                return node;
            }

            function statusClass(node) {
                if (node.status === "in_progress") return "run";
                if (node.status === "queued" || node.status === "pending") return "idle";
                if (node.status === "completed") {
                    if (node.conclusion === "success") return "ok";
                    if (node.conclusion === "skipped" || node.conclusion === "neutral") return "skip";
                    return "bad";
                }
                return "idle";
            }

            const FILL = {
                ok: "var(--ok-muted)",
                bad: "var(--bad-muted)",
                run: "var(--run-muted)",
                idle: "var(--idle-muted)",
                skip: "var(--idle-muted)",
            };
            const STROKE = {
                ok: "var(--ok)",
                bad: "var(--bad)",
                run: "var(--run)",
                idle: "var(--idle)",
                skip: "var(--idle)",
            };

            // Longest-path layering for a DAG: layer(n) = 0 if no deps, else
            // max(layer(parent)) + 1. Iterate to a fixed point (DAG → converges).
            function computeLayers(nodes, edges) {
                const incoming = new Map(nodes.map((n) => [n.id, []]));
                for (const e of edges) {
                    if (incoming.has(e.to)) incoming.get(e.to).push(e.from);
                }
                const layer = new Map(nodes.map((n) => [n.id, 0]));
                for (let pass = 0; pass < nodes.length + 1; pass++) {
                    let changed = false;
                    for (const n of nodes) {
                        const parents = incoming.get(n.id);
                        let best = 0;
                        for (const p of parents) {
                            if (layer.has(p)) best = Math.max(best, layer.get(p) + 1);
                        }
                        if (best !== layer.get(n.id)) {
                            layer.set(n.id, best);
                            changed = true;
                        }
                    }
                    if (!changed) break;
                }
                return layer;
            }

            function legSummary(node) {
                if (!node.legs || node.legs.length <= 1) return null;
                const total = node.legs.length;
                const done = node.legs.filter((l) => l.status === "completed").length;
                const ok = node.legs.filter((l) => l.conclusion === "success").length;
                return `matrix · ${done}/${total} done · ${ok} ok`;
            }

            function render(run) {
                const svg = document.getElementById("graph");
                const empty = document.getElementById("empty");
                svg.innerHTML = "";

                const nodes = run?.nodes || [];
                if (nodes.length === 0) {
                    empty.classList.remove("hidden");
                    svg.setAttribute("width", 0);
                    svg.setAttribute("height", 0);
                    return;
                }
                empty.classList.add("hidden");

                const edges = run.edges || [];
                const layer = computeLayers(nodes, edges);

                // Bucket nodes per layer, preserving declaration order.
                const cols = new Map();
                for (const n of nodes) {
                    const l = layer.get(n.id) || 0;
                    if (!cols.has(l)) cols.set(l, []);
                    cols.get(l).push(n);
                }

                const pos = new Map();
                let maxRows = 0;
                for (const [l, group] of cols) {
                    group.forEach((n, i) => {
                        pos.set(n.id, {
                            x: PAD_X + l * COL_W,
                            y: PAD_Y + i * ROW_H,
                        });
                    });
                    maxRows = Math.max(maxRows, group.length);
                }

                const maxLayer = Math.max(...[...cols.keys()]);
                const width = PAD_X * 2 + maxLayer * COL_W + BOX_W;
                const height = PAD_Y * 2 + maxRows * ROW_H;
                svg.setAttribute("width", width);
                svg.setAttribute("height", height);
                svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

                // Edges first (under nodes).
                for (const e of edges) {
                    const a = pos.get(e.from);
                    const b = pos.get(e.to);
                    if (!a || !b) continue;
                    const x1 = a.x + BOX_W;
                    const y1 = a.y + BOX_H / 2;
                    const x2 = b.x;
                    const y2 = b.y + BOX_H / 2;
                    const mx = (x1 + x2) / 2;
                    const fromNode = nodes.find((n) => n.id === e.from);
                    const active = fromNode && fromNode.status === "in_progress";
                    svg.appendChild(
                        el("path", {
                            class: "edge" + (active ? " active" : ""),
                            d: `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`,
                        }),
                    );
                }

                // Nodes.
                for (const n of nodes) {
                    const p = pos.get(n.id);
                    const cls = statusClass(n);
                    const g = el("g", {
                        class: "node" + (n.status === "in_progress" ? " running" : ""),
                        transform: `translate(${p.x}, ${p.y})`,
                    });
                    if (n.url) {
                        g.style.cursor = "pointer";
                        g.addEventListener("click", () => window.open(n.url, "_blank", "noopener"));
                    }

                    g.appendChild(
                        el("rect", {
                            class: "box",
                            width: BOX_W,
                            height: BOX_H,
                            rx: 8,
                            fill: FILL[cls],
                            stroke: STROKE[cls],
                            "stroke-dasharray": cls === "skip" ? "4 3" : "",
                        }),
                    );

                    const label = n.label.length > 26 ? n.label.slice(0, 25) + "…" : n.label;
                    g.appendChild(el("text", { x: 12, y: 22, "font-weight": "600" }, label));

                    const sub = legSummary(n) || conclusionLabel(n);
                    g.appendChild(el("text", { class: "sub", x: 12, y: 40 }, sub));

                    // status glyph top-right
                    g.appendChild(statusGlyph(n, BOX_W - 20, 18));

                    const tip = el("title", {}, tooltip(n));
                    g.appendChild(tip);

                    svg.appendChild(g);
                }
            }

            function conclusionLabel(n) {
                if (n.status === "in_progress") return "running…";
                if (n.status === "queued" || n.status === "pending") return "queued";
                if (n.status === "completed") return n.conclusion || "done";
                return n.status;
            }

            function statusGlyph(n, x, y) {
                const cls = statusClass(n);
                const sym = {
                    ok: "✓",
                    bad: "✕",
                    run: "●",
                    idle: "○",
                    skip: "–",
                }[cls];
                return el(
                    "text",
                    { x, y, "text-anchor": "middle", "font-size": 13, fill: STROKE[cls], "font-weight": "700" },
                    sym,
                );
            }

            function tooltip(n) {
                const lines = [n.label];
                lines.push(`status: ${conclusionLabel(n)}`);
                if (n.legs && n.legs.length > 1) {
                    lines.push(`${n.legs.length} matrix legs:`);
                    for (const l of n.legs.slice(0, 12)) {
                        lines.push(`  • ${l.name} — ${l.conclusion || l.status}`);
                    }
                }
                if (n.unmatched) lines.push("(not matched to workflow YAML)");
                return lines.join("\n");
            }

            function fmtElapsed(startIso, endIso) {
                if (!startIso) return "";
                const start = new Date(startIso).getTime();
                const end = endIso ? new Date(endIso).getTime() : Date.now();
                let s = Math.max(0, Math.round((end - start) / 1000));
                const h = Math.floor(s / 3600);
                s -= h * 3600;
                const m = Math.floor(s / 60);
                s -= m * 60;
                return (h ? `${h}h ` : "") + (m || h ? `${m}m ` : "") + `${s}s`;
            }

            function paint(state) {
                const badge = document.getElementById("status-badge");
                const statusText = document.getElementById("status-text");
                const footLeft = document.getElementById("foot-left");
                const footRight = document.getElementById("foot-right");

                if (state.status === "error") {
                    footLeft.textContent = "Error: " + (state.message || "unknown");
                    return;
                }
                if (state.status === "loading" || state.status === "idle") {
                    statusText.textContent = state.status === "loading" ? "loading" : "idle";
                    badge.className = "badge idle";
                    footLeft.textContent = state.message || "";
                    if (!state.run) render(null);
                    return;
                }

                const run = state.run;
                if (!run) return;
                lastRun = run;

                document.getElementById("wf-name").textContent = run.runName || "Workflow run";

                // Top-level run badge.
                let cls = "idle",
                    label = run.status;
                if (run.status === "in_progress" || run.status === "queued") {
                    cls = run.status === "in_progress" ? "run" : "idle";
                } else if (run.status === "completed") {
                    label = run.conclusion || "completed";
                    cls = run.conclusion === "success" ? "ok" : run.conclusion === "skipped" ? "idle" : "bad";
                }
                badge.className = "badge " + cls;
                statusText.innerHTML =
                    run.status === "in_progress" ? '<span class="spin"></span> ' + label : label;

                const meta = document.getElementById("meta");
                meta.innerHTML = "";
                const bits = [
                    run.htmlUrl ? `<a href="${run.htmlUrl}" target="_blank" rel="noopener">${run.repo} #${run.runNumber}</a>` : `${run.repo} #${run.runNumber}`,
                    run.headBranch ? `⎇ ${run.headBranch}` : null,
                    run.headSha ? `@ ${run.headSha}` : null,
                    run.event ? `on ${run.event}` : null,
                    run.actor ? `by ${run.actor}` : null,
                ].filter(Boolean);
                meta.innerHTML = bits.map((b) => `<span>${b}</span>`).join("");

                render(run);

                const elapsed = fmtElapsed(run.runStartedAt, run.status === "completed" ? run.updatedAt : null);
                footLeft.textContent =
                    `${run.nodes.length} jobs · ${run.edges.length} deps` +
                    (elapsed ? ` · ${elapsed}` : "") +
                    (run.flat ? " · flat (no needs found)" : "") +
                    (run.yamlError ? " · ⚠ workflow yaml unavailable" : "");
                footRight.textContent = "updated " + new Date(state.updatedAt).toLocaleTimeString();
            }

            // Live updates via SSE, with a fetch fallback for the first paint.
            function connect() {
                const es = new EventSource("/events");
                es.onmessage = (ev) => {
                    try {
                        paint(JSON.parse(ev.data));
                    } catch {
                        /* ignore malformed frame */
                    }
                };
                es.onerror = () => {
                    es.close();
                    setTimeout(connect, 2000);
                };
            }

            fetch("/state")
                .then((r) => r.json())
                .then(paint)
                .catch(() => {});
            connect();

            // Keep elapsed timers live for in-progress runs.
            setInterval(() => {
                if (lastRun && lastRun.status !== "completed") {
                    const elapsed = fmtElapsed(lastRun.runStartedAt, null);
                    const fl = document.getElementById("foot-left");
                    if (elapsed && fl) {
                        fl.textContent = `${lastRun.nodes.length} jobs · ${lastRun.edges.length} deps · ${elapsed}` +
                            (lastRun.flat ? " · flat" : "");
                    }
                }
            }, 1000);
        </script>
    </body>
</html>
